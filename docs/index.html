<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>趋势追踪 · Trend Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="mark"></span>
    <div>
      <h1>趋势追踪</h1>
      <p class="sub">收盘突破 · 吊灯止损 · 头寸规模</p>
    </div>
  </div>
  <div class="market" id="market"></div>
  <div class="meta">
    <span class="freshness" id="freshness"></span>
    <span id="updated">—</span>
    <span class="src" id="source"></span>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" data-view="signals">信号<span class="badge" id="sigCount">0</span></button>
  <button class="tab" data-view="overview">总览</button>
  <div class="controls">
    <input id="search" type="search" placeholder="搜索代码 / 名称…" autocomplete="off">
    <select id="subFilter"><option value="">全部小类</option></select>
  </div>
</nav>

<div class="filterbar">
  <span class="flabel">大类</span>
  <div class="tiles" id="majorTiles"></div>
  <span class="risk-ctl acct">账户 $<input id="acctInput" type="text" inputmode="numeric" autocomplete="off"></span>
  <span class="risk-ctl pct">每笔风险<input id="rpctInput" type="text" inputmode="decimal" autocomplete="off">%</span>
  <button class="add-btn" id="addBtn">＋ 添加股票</button>
  <span class="risk-readout" id="riskReadout"></span>
</div>

<main>
  <div id="tableWrap" class="table-wrap">
    <table id="grid"><thead></thead><tbody></tbody></table>
  </div>
  <p class="empty" id="empty" hidden></p>
</main>

<!-- Add-stock modal -->
<div class="modal-scrim" id="addScrim" hidden></div>
<div class="modal" id="addModal" hidden role="dialog" aria-modal="true">
  <button class="drawer-close" id="addClose" aria-label="关闭">×</button>
  <h3>添加股票</h3>
  <p class="modal-sub">填好后生成新的 <code>config.csv</code>，一键复制或直接到 GitHub 提交。提交后自动重算。</p>
  <div class="form-grid">
    <label>代码 ticker<input id="f_ticker" placeholder="如 NVDA / MOG.A" autocomplete="off"></label>
    <label>交易所（可留空，自动识别）<input id="f_exch" list="exchList" placeholder="留空将自动抓取" autocomplete="off"></label>
    <label>对标 ETF<input id="f_bench" list="benchList" placeholder="如 SOXX" autocomplete="off"></label>
    <label>大类<input id="f_major" list="majorList" placeholder="如 科技" autocomplete="off"></label>
    <label>小类<input id="f_sub" list="subList" placeholder="如 半导体" autocomplete="off"></label>
  </div>
  <datalist id="exchList"></datalist>
  <datalist id="benchList"></datalist>
  <datalist id="majorList"></datalist>
  <datalist id="subList"></datalist>
  <div class="modal-actions">
    <button class="btn-primary" id="addQueue">加入待添加</button>
    <span class="pending-note" id="pendingNote"></span>
  </div>
  <div id="pendingBox" hidden>
    <div class="pending-list" id="pendingList"></div>
    <label class="gen-label">新的 config.csv（含你原有 + 待添加）：</label>
    <textarea id="cfgOut" readonly rows="6"></textarea>
    <div class="modal-actions">
      <button class="btn-primary" id="copyCfg">复制全部</button>
      <a class="btn-link" id="ghLink" target="_blank" rel="noopener">在 GitHub 编辑 config.csv ↗</a>
      <button class="btn-ghost" id="clearPending">清空</button>
    </div>
    <p class="modal-hint" id="ghHint"></p>
  </div>
</div>
<div class="drawer-scrim" id="scrim" hidden></div>
<aside class="drawer" id="drawer" hidden aria-hidden="true">
  <button class="drawer-close" id="drawerClose" aria-label="关闭">×</button>
  <div id="detail"></div>
</aside>

<footer class="foot">
  <span>数据：Yahoo Finance（备用 Stooq）· 免费、无需密钥 · 仅供研究，非投资建议</span>
</footer>

<script src="app.js"></script>
</body>
</html>
