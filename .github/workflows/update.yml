name: Update prices & signals

on:
  workflow_dispatch: {}        # manual "Run workflow" button
  push:
    paths:
      - "config.csv"           # adding a stock triggers an immediate rebuild
      - "engine/**"

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build signals
        run: python engine/build.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save the freshly built data, then on each attempt reset to the latest
          # remote tip and re-apply it. This avoids "fetch first" / merge conflicts
          # if another run or your own commit advanced main while we were building.
          rm -rf /tmp/data && cp -r docs/data /tmp/data
          for i in 1 2 3 4 5; do
            git fetch origin main -q
            git reset --hard FETCH_HEAD -q
            rm -rf docs/data && mkdir -p docs && cp -r /tmp/data docs/data
            git add -A docs/data
            if git diff --cached --quiet; then
              echo "No changes vs remote."; exit 0
            fi
            git commit -m "data: refresh signals ($(date -u +%Y-%m-%dT%H:%MZ))" -q
            if git push; then
              echo "Pushed."; exit 0
            fi
            echo "Push raced with another update, retrying ($i)…"; sleep 4
          done
          echo "Could not push after retries (will catch up next run)."; exit 0
