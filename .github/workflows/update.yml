name: Update prices & signals

on:
  schedule:
    # GitHub cron is UTC and does NOT follow UK daylight saving, so we list the
    # UTC hours that cover 10pm & 11pm London in BOTH seasons (all before midnight
    # UTC, so no cross-day weekday shift). Each weekday two of these hit 10pm/11pm
    # London; the third is a harmless extra. No-op when data is unchanged.
    #   BST (summer): 10pm=21:00Z, 11pm=22:00Z
    #   GMT (winter): 10pm=22:00Z, 11pm=23:00Z
    - cron: "0 21 * * 1-5"
    - cron: "0 22 * * 1-5"
    - cron: "0 23 * * 1-5"
  workflow_dispatch: {}        # manual "Run workflow" button
  push:
    paths:
      - "config.csv"           # adding a stock triggers an immediate rebuild
      - "engine/**"

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build signals
        run: python engine/build.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: refresh signals ($(date -u +%Y-%m-%d))"
            git push
          fi
