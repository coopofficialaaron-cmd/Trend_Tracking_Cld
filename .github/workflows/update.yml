name: Update prices & signals

on:
  schedule:
    # GitHub cron is always UTC and does NOT follow UK daylight saving, so both
    # seasons are listed. Each weekday this fires twice at the intended London
    # time and twice ~1h off (harmless extra redundancy; no-op if data unchanged).
    - cron: "50 21 * * 1-5"   # 22:50 London (BST/summer) — first run, ~1h50 after US close
    - cron: "50 22 * * 1-5"   # 22:50 London (GMT/winter) — first run
    - cron: "20 0  * * 2-6"   # ~01:20 London (BST/summer) — second run, a few hours later
    - cron: "20 1  * * 2-6"   # ~01:20 London (GMT/winter) — second run
  workflow_dispatch: {}        # manual "Run workflow" button
  push:
    paths:
      - "config.csv"           # adding a stock triggers an immediate rebuild
      - "engine/**"

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build signals
        run: python engine/build.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: refresh signals ($(date -u +%Y-%m-%d))"
            git push
          fi
