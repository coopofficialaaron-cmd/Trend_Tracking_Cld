name: Update prices & signals

on:
  schedule:
    - cron: "30 23 * * 1-5"   # weekdays ~23:30 UTC, after US close & Stooq EOD update
  workflow_dispatch: {}        # manual "Run workflow" button
  push:
    paths:
      - "config.csv"
      - "engine/**"

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build signals from Stooq
        run: python engine/build.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: refresh signals ($(date -u +%Y-%m-%d))"
            git push
          fi
